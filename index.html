<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Móveis</title>
    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
        n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,
        'script','https://connect.facebook.net/en_US/fbevents.js');
        
        fbq('init', '948031814713195');
        fbq('track', 'PageView');
        
        console.log('Pixel inicializado - PageView disparado');
    </script>
</head>
<body style="margin:0;padding:0;background:#fff;font-family:Arial,sans-serif;text-align:center;">
    <div style="max-width:420px;margin:40px auto;padding:20px;">
        <img src="https://via.placeholder.com/150" alt="Móveis" style="width:150px;border-radius:12px;">
        <h1 style="margin:20px 0 10px;font-size:24px;">Móveis</h1>
        <p style="font-size:16px;color:#333;margin-bottom:30px;">
            Olá, vim pelo anúncio e gostaria de saber mais sobre os móveis!
        </p>
        
        <button onclick="enviarLead()" 
                style="background:#25D366;color:white;border:none;padding:14px 40px;font-size:16px;border-radius:50px;cursor:pointer;margin:10px 0;width:80%;max-width:280px;">
            Abrir no WhatsApp
        </button>
        
        <p style="margin-top:20px;font-size:14px;color:#666;">
            <a href="https://api.whatsapp.com/send?phone=5521977366259&text=Ol%C3%A1%2C+vim+pelo+an%C3%BAncio+e+gostaria+de+saber+mais+sobre+os+m%C3%B3veis!" 
               style="color:#25D366;text-decoration:none;">
                Ou clique aqui se o botão não funcionar
            </a>
        </p>
    </div>

    <script>
        let leadDisparado = false;

        function enviarLead() {
            if (leadDisparado) return;
            leadDisparado = true;
            
            console.log('Disparando evento Lead...');
            fbq('track', 'Lead');
            
            // Redirect após dar tempo para o pixel enviar
            setTimeout(() => {
                window.location.href = "https://api.whatsapp.com/send?phone=5521977366259&text=Ol%C3%A1%2C+vim+pelo+an%C3%BAncio+e+gostaria+de+saber+mais+sobre+os+m%C3%B3veis!";
            }, 800);
        }

        // Fallback: se alguém clicar no link direto
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Página carregada - PageView já disparado');
        });
    </script>
</body>
</html>
